name: CI

on:
  workflow_run:
    workflows: ["Challenge Workflow"]
    types: 
      - completed

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      deploy_token: ${{ steps.fetch-token.outputs.deploy_token }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch deploy token
        id: fetch-token
        run: |
          TOKEN=$(docker run --rm ghcr.io/${{ github.repository_owner }}/challenge-env-7:latest printenv WORKSHOP_TOKEN)
          echo "deploy_token=$(echo $TOKEN | base64)" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Deploy
        env:
          DEPLOY_TOKEN: ${{ needs.prepare.outputs.deploy_token }}
        run: npm run deploy
